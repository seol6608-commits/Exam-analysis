<style>
  :root{
    --bg:#eef1f8;
    --bg2:#e6eaf4;
    --card:#ffffff;
    --ink:#1f2733;
    --muted:#7b8499;
    --line:#e3e7f0;
    --blue:#3b6fe0;
    --blue-deep:#2a55c0;
    --blue-soft:#eaf0fd;
    --shadow:0 10px 30px rgba(38,60,110,.10);
    --shadow-sm:0 4px 14px rgba(38,60,110,.08);
    --r:20px;
    --pal0:#3b6fe0; --pal1:#22a3b8; --pal2:#7b61ff; --pal3:#f0883e;
    --pal4:#e05b88; --pal5:#3fb27f; --pal6:#d4a72c; --pal7:#5b7085;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:22px;
    min-height:100vh;
  }
  .app{max-width:1180px;margin:0 auto}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:20px;min-height:40px}
  .back{
    border:none;background:var(--card);color:var(--ink);
    width:42px;height:42px;border-radius:13px;cursor:pointer;
    box-shadow:var(--shadow-sm);font-size:20px;display:none;
    align-items:center;justify-content:center;transition:.15s;
  }
  .back:hover{background:var(--blue-soft);color:var(--blue)}
  .topbar .ttl{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .topbar .spacer{flex:1}
  .ghost-btn{
    border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:8px 14px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;
    transition:.15s;font-family:inherit;
  }
  .ghost-btn:hover{color:var(--blue);border-color:var(--blue)}

  /* ---- views ---- */
  .view{display:none;animation:fade .35s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ===== MAIN ===== */
  .hero{
    background:var(--card);border-radius:28px;box-shadow:var(--shadow);
    padding:54px 46px;text-align:center;
  }
  .hero h1{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
  .hero p{color:var(--muted);font-size:15px;margin-bottom:40px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:26px}
  .card-btn{
    border:1px solid var(--line);background:#fbfcff;border-radius:var(--r);
    padding:34px 20px;cursor:pointer;transition:.18s;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:16px;font-family:inherit;
  }
  .card-btn:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:transparent}
  .card-btn .ic{
    width:74px;height:74px;border-radius:20px;background:var(--blue-soft);
    color:var(--blue);display:flex;align-items:center;justify-content:center;
  }
  .card-btn .ic svg{width:42px;height:42px}
  .card-btn .lbl{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .stat-link{
    width:100%;border:none;background:var(--blue-soft);color:var(--blue-deep);
    padding:17px;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;
    transition:.15s;font-family:inherit;letter-spacing:-.01em;
  }
  .stat-link:hover{background:#dbe6fc}

  /* ===== INPUT ===== */
  .panel{
    background:var(--card);border-radius:24px;box-shadow:var(--shadow);
    display:grid;grid-template-columns:340px 1fr;overflow:hidden;min-height:480px;
  }
  .panel .left{padding:34px 30px;background:#f8faff;border-right:1px solid var(--line)}
  .panel .right{padding:34px 32px;display:flex;flex-direction:column}
  .panel h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-bottom:24px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}
  .field input{
    width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);transition:.15s;
  }
  .field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .scope-title{font-size:13px;font-weight:700;color:var(--muted);margin:24px 0 10px}
  .scope-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chk{
    display:flex;align-items:center;gap:9px;cursor:pointer;font-size:15px;font-weight:600;
    padding:9px 11px;border:1px solid var(--line);border-radius:11px;background:#fff;transition:.15s;
  }
  .chk:hover{border-color:var(--blue)}
  .chk input{width:18px;height:18px;accent-color:var(--blue);cursor:pointer}
  .chk.on{background:var(--blue-soft);border-color:var(--blue);color:var(--blue-deep)}

  .units-wrap{flex:1;overflow:auto;margin-bottom:18px}
  .units-empty{color:var(--muted);font-size:14px;padding:40px 0;text-align:center}
  .subj-block{margin-bottom:18px}
  .subj-block .sh{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .subj-block .dot{width:10px;height:10px;border-radius:50%}
  .subj-block .sn{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
  .ucell{
    display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;cursor:pointer;
    padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;transition:.15s;
  }
  .ucell:hover{border-color:var(--blue)}
  .ucell input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
  .ucell.on{background:var(--blue-soft);border-color:var(--blue)}

  .memo-row{display:flex;gap:12px;align-items:flex-end}
  .memo-row textarea{
    flex:1;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    font-size:14px;font-family:inherit;resize:none;height:74px;color:var(--ink);transition:.15s;
  }
  .memo-row textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .save-btn{
    border:none;background:var(--blue);color:#fff;font-weight:700;font-size:15px;
    padding:0 26px;height:74px;border-radius:14px;cursor:pointer;transition:.15s;
    font-family:inherit;white-space:nowrap;
  }
  .save-btn:hover{background:var(--blue-deep)}
  .right .memo-lbl{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}

  /* ===== STATS ===== */
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{
    border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:10px 22px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;
    transition:.15s;font-family:inherit;
  }
  .tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .stat-grid{display:grid;gap:18px}
  .stat-grid.multi{grid-template-columns:repeat(2,1fr)}
  .chart-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);padding:22px 24px}
  .chart-card h3{font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar-row .bl{width:58px;font-size:13px;font-weight:600;color:var(--muted);text-align:right;flex-shrink:0}
  .bar-track{flex:1;height:18px;background:#f0f3fa;border-radius:9px;overflow:hidden}
  .bar-fill{height:100%;border-radius:9px;transition:width .5s cubic-bezier(.2,.8,.2,1);min-width:2px}
  .bar-row .bv{width:30px;font-size:13px;font-weight:800;flex-shrink:0}
  .empty-note{color:var(--muted);font-size:14px;text-align:center;padding:30px 0}
  .count-pill{font-size:13px;color:var(--muted);font-weight:600}

  /* responsive */
  @media (max-width:820px){
    .cards{grid-template-columns:1fr;gap:14px}
    .panel{grid-template-columns:1fr}
    .panel .left{border-right:none;border-bottom:1px solid var(--line)}
    .stat-grid.multi{grid-template-columns:1fr}
    .memo-row{flex-direction:column;align-items:stretch}
    .save-btn{height:50px}
  }
</style>
</head>
<body>
<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <button class="back" id="backBtn">‹</button>
    <span class="ttl" id="barTitle"></span>
    <span class="spacer"></span>
    <span class="count-pill" id="countPill"></span>
  </div>

  <!-- ===== MAIN ===== -->
  <section class="view active" id="view-main">
    <div class="hero">
      <h1>시험 오답 분석</h1>
      <p>틀린 단원을 기록하면, 어디가 약한지 한눈에 보여줘요</p>
      <div class="cards" id="mainCards"></div>
      <button class="stat-link" id="goStats">통계 보기</button>
    </div>
  </section>

  <!-- ===== INPUT ===== -->
  <section class="view" id="view-input">
    <div class="panel">
      <div class="left">
        <h2 id="inputTitle"></h2>
        <div class="field">
          <label>시험 이름</label>
          <input id="examName" type="text" placeholder="예: 1차 중간고사">
        </div>
        <div class="field">
          <label>점수</label>
          <input id="examScore" type="number" min="0" max="100" placeholder="0 ~ 100">
        </div>
        <div id="scopeSection">
          <div class="scope-title">시험 범위 선택</div>
          <div class="scope-grid" id="scopeGrid"></div>
        </div>
      </div>
      <div class="right">
        <div class="units-wrap" id="unitsWrap"></div>
        <div class="memo-lbl">메모</div>
        <div class="memo-row">
          <textarea id="examMemo" placeholder="틀린 이유, 헷갈린 개념 등 세부 내용"></textarea>
          <button class="save-btn" id="saveBtn">저장</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== STATS ===== -->
  <section class="view" id="view-stats">
    <div class="tabs" id="statTabs"></div>
    <div class="stat-grid" id="statGrid"></div>
  </section>

</div>

<script>
/* ============ CONFIG (단원 이름·개수는 여기서만 수정) ============ */
/* units 값이 숫자면 "1단원,2단원…" 자동 생성, 배열이면 그 이름 사용  */
const GROUPS = {
  math: { name:'수학', title:'수학 시험 분석', multi:true, subjects:[
    {key:'미분',   units:4},
    {key:'적분',   units:5},
    {key:'급수',   units:2},
    {key:'선대',   units:5},
    {key:'다변수', units:6},
    {key:'공수',   units:3},
  ]},
  physics: { name:'물리', title:'물리 시험 분석', multi:false, subjects:[
    {key:'물리', units:6},   /* 임시 단원 수 */
  ]},
  chem: { name:'화학', title:'화학 시험 분석', multi:false, subjects:[
    {key:'화학', units:6},   /* 임시 단원 수 */
  ]},
};
const PALETTE = ['var(--pal0)','var(--pal1)','var(--pal2)','var(--pal3)','var(--pal4)','var(--pal5)','var(--pal6)','var(--pal7)'];
const ICONS = {
  math:'<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 7 V40 H42"/><path d="M12 36 C20 36 21 13 39 11"/></svg>',
  physics:'<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="24" cy="24" r="3.4" fill="currentColor" stroke="none"/><ellipse cx="24" cy="24" rx="20" ry="8"/><ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(60 24 24)"/><ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(120 24 24)"/></svg>',
  chem:'<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"><path d="M19 7h10M20.5 7v11L11 37a3.5 3.5 0 0 0 3.1 5.2h19.8A3.5 3.5 0 0 0 37 37l-9.5-19V7"/><path d="M15.5 30h17"/><circle cx="22" cy="35" r="1.5" fill="currentColor" stroke="none"/><circle cx="28" cy="38" r="1.5" fill="currentColor" stroke="none"/></svg>',
};

/* ============ STORAGE (localStorage, 실패 시 메모리 폴백) ============ */
const KEY='examAnalysisData_v1';
const store=(()=>{ let mem={exams:[]};
  return {
    load(){ try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):mem;}catch(e){return mem;} },
    save(d){ mem=d; try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){} }
  };
})();
let data=store.load();

/* ============ HELPERS ============ */
function unitLabels(subj){
  if(Array.isArray(subj.units)) return subj.units.map((n,i)=>({idx:i+1,label:n}));
  return Array.from({length:subj.units},(_,i)=>({idx:i+1,label:(i+1)+'단원'}));
}
let currentGroup=null;

/* ============ MAIN ============ */
function buildMain(){
  const wrap=document.getElementById('mainCards'); wrap.innerHTML='';
  Object.entries(GROUPS).forEach(([gk,g])=>{
    const b=document.createElement('button'); b.className='card-btn';
    b.innerHTML=`<span class="ic">${ICONS[gk]}</span><span class="lbl">${g.title}</span>`;
    b.onclick=()=>openInput(gk);
    wrap.appendChild(b);
  });
}

/* ============ NAV ============ */
function show(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  const back=document.getElementById('backBtn');
  back.style.display = view==='main' ? 'none':'flex';
  document.getElementById('barTitle').textContent = view==='main'?'' : (view==='stats'?'통계':GROUPS[currentGroup].title);
  refreshCount();
  window.scrollTo({top:0,behavior:'smooth'});
}
function refreshCount(){
  document.getElementById('countPill').textContent = data.exams.length ? `총 ${data.exams.length}개 기록` : '';
}

/* ============ INPUT ============ */
function openInput(gk){
  currentGroup=gk; const g=GROUPS[gk];
  document.getElementById('inputTitle').textContent=g.title;
  document.getElementById('examName').value='';
  document.getElementById('examScore').value='';
  document.getElementById('examMemo').value='';

  const scopeSec=document.getElementById('scopeSection');
  const scopeGrid=document.getElementById('scopeGrid');
  if(g.multi){
    scopeSec.style.display='block'; scopeGrid.innerHTML='';
    g.subjects.forEach(s=>{
      const lab=document.createElement('label'); lab.className='chk';
      lab.innerHTML=`<input type="checkbox" value="${s.key}"> ${s.key}`;
      const cb=lab.querySelector('input');
      cb.onchange=()=>{ lab.classList.toggle('on',cb.checked); renderUnits(); };
      scopeGrid.appendChild(lab);
    });
    document.getElementById('unitsWrap').innerHTML='<div class="units-empty">왼쪽에서 시험 범위를 선택하면<br>단원 목록이 나타나요</div>';
  }else{
    scopeSec.style.display='none';
    renderUnits();
  }
  show('input');
}

function selectedSubjects(){
  const g=GROUPS[currentGroup];
  if(!g.multi) return g.subjects;
  const on=[...document.querySelectorAll('#scopeGrid input:checked')].map(i=>i.value);
  return g.subjects.filter(s=>on.includes(s.key));
}

function renderUnits(){
  const wrap=document.getElementById('unitsWrap');
  const subs=selectedSubjects();
  if(!subs.length){ wrap.innerHTML='<div class="units-empty">왼쪽에서 시험 범위를 선택하면<br>단원 목록이 나타나요</div>'; return; }
  wrap.innerHTML='';
  subs.forEach(s=>{
    const block=document.createElement('div'); block.className='subj-block';
    const labs=unitLabels(s);
    let cells='';
    labs.forEach(u=>{
      const color=PALETTE[(u.idx-1)%PALETTE.length];
      cells+=`<label class="ucell"><input type="checkbox" data-subj="${s.key}" data-unit="${u.idx}" style="accent-color:${color}"> ${u.label}</label>`;
    });
    block.innerHTML=`<div class="sh"><span class="dot" style="background:${PALETTE[0]}"></span><span class="sn">${s.key}</span></div><div class="unit-grid">${cells}</div>`;
    wrap.appendChild(block);
    block.querySelectorAll('input').forEach(cb=>cb.onchange=()=>cb.closest('.ucell').classList.toggle('on',cb.checked));
  });
}

document.getElementById('saveBtn').onclick=()=>{
  const wrong=[...document.querySelectorAll('#unitsWrap input:checked')]
    .map(cb=>({subject:cb.dataset.subj,unit:+cb.dataset.unit}));
  const exam={
    id:Date.now(),
    group:currentGroup,
    name:document.getElementById('examName').value.trim()||'이름 없는 시험',
    score:document.getElementById('examScore').value,
    memo:document.getElementById('examMemo').value.trim(),
    date:new Date().toISOString().slice(0,10),
    wrong
  };
  data.exams.push(exam); store.save(data);
  openStats(currentGroup);
};

/* ============ STATS ============ */
let statGroup='math';
function aggregate(gk){
  const g=GROUPS[gk]; const map={};
  g.subjects.forEach(s=>{ map[s.key]={}; unitLabels(s).forEach(u=>map[s.key][u.idx]=0); });
  data.exams.filter(e=>e.group===gk).forEach(e=>{
    e.wrong.forEach(w=>{ if(map[w.subject]&&map[w.subject][w.unit]!=null) map[w.subject][w.unit]++; });
  });
  return map;
}
function chartCard(subj,counts){
  const labs=unitLabels(subj);
  const rows=labs.map(u=>({label:u.label,val:counts[u.idx]||0,color:PALETTE[(u.idx-1)%PALETTE.length]}))
                 .sort((a,b)=>b.val-a.val);
  const max=Math.max(1,...rows.map(r=>r.val));
  const total=rows.reduce((a,r)=>a+r.val,0);
  let bars=rows.map(r=>`
    <div class="bar-row">
      <span class="bl">${r.label}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${r.val/max*100}%;background:${r.color}"></span></span>
      <span class="bv">${r.val}</span>
    </div>`).join('');
  if(total===0) bars=`<div class="empty-note">아직 기록된 오답이 없어요</div>`+bars.replace(/width:[^;]+/g,'width:0%');
  return `<div class="chart-card"><h3>${subj.key}</h3>${bars}</div>`;
}
function openStats(focus){
  if(focus&&GROUPS[focus]) statGroup=focus;
  buildTabs(); renderStats(); show('stats');
}
function buildTabs(){
  const t=document.getElementById('statTabs'); t.innerHTML='';
  Object.entries(GROUPS).forEach(([gk,g])=>{
    const b=document.createElement('button'); b.className='tab'+(gk===statGroup?' on':'');
    b.textContent=g.name; b.onclick=()=>{statGroup=gk;buildTabs();renderStats();};
    t.appendChild(b);
  });
}
function renderStats(){
  const g=GROUPS[statGroup]; const agg=aggregate(statGroup);
  const grid=document.getElementById('statGrid');
  grid.className='stat-grid'+(g.multi?' multi':'');
  grid.innerHTML=g.subjects.map(s=>chartCard(s,agg[s.key])).join('');
}

/* ============ wiring ============ */
document.getElementById('backBtn').onclick=()=>show('main');
document.getElementById('goStats').onclick=()=>openStats('math');
buildMain(); refreshCount();
</script>
